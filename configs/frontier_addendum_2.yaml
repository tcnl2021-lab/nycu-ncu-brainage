# Frontier configs for preregister_addendum_2 (filed 2026-04-25).
# Leave-one-out (LOO) ablation: split MRI and EEG blocks by acquisition-
# design domain and measure each domain's marginal contribution by
# REMOVING it from the audit baseline.
#
# This is an INTERPRETABILITY ablation, not a §6 information-gain test.
# Sign convention (audit_stats.py): dMAE_observed = MAE(parent) - MAE(child).
#   Negative dMAE  => dropping the domain HURT the model
#                     (i.e., the domain carries unique age signal).
#   Positive dMAE  => dropping the domain helped (noise/redundancy).
#   CI includes 0  => domain effect indistinguishable from null at this N.
#
# Block vocabulary extended additively (see train_clean.py
# _MRI_DROP_DOMAINS / _EEG_DROP_DOMAINS — existing block outputs unchanged).
# Acceptance rule §6 does not apply: "confirmed/fragile/overturned" labels
# in stats_*.csv reflect the §6 logic against parent, not LOO interpretation.
# Fold hash unchanged: db1510dd5442d4492955579dee406c6dd7be8feabea80d929672b2dc0f5b5a6d
#
# Baseline mirrors addendum_1 01b (BEH, EEG, MRI, DTI_ROI, DL_SFCN,
# DL_PYMENT, DL_RSFMRI_FC). Each LOO config swaps either MRI or EEG for
# its drop-one-domain variant.

configs:
  - id: "00c"
    name: baseline_full
    parent: null
    source_commit: addendum_2
    pre_audit_val_mae: null
    note: "Baseline (full MRI + full EEG). Same blocks as addendum_1 01b."
    blocks: [BEH, EEG, MRI, DTI_ROI, DL_SFCN, DL_PYMENT, DL_RSFMRI_FC]

