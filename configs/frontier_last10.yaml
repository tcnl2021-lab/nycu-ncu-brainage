# Frontier configs to replay under the clean audit protocol.
#
# Source: extracted ONCE from
#   /media/DATA3/Quanta/codes/brain_age_2026/tuning/results.tsv
# during the freeze step (see preregister.md §10). After this file was
# written, results.tsv is off-limits to all audit scripts.
#
# Each config defines a feature stack as a set of `blocks`. Under the clean
# protocol every block contributes one outer-fold-aligned RidgeCV OOF column;
# those columns are stacked and fed to a RidgeCV meta + RidgeCV residual; no
# clip is applied (preregister §8 Option A).
#
# Block vocabulary (declared in scripts/train_clean.py):
#   BEH                       — cache X_beh + SEX (200 cols)
#   EEG                       — cache X_eeg (509 cols)
#   EEG_PSD_RAW               — 150 PSD log-band-powers from
#                               Data/DL_features/eeg_psd_features.csv,
#                               concatenated to the EEG block (eeg_psd_raw step)
#   MRI                       — cache X_mri inflated back to 1266 cols by
#                               re-introducing 172 STRUCTURE_*_FA cortical
#                               projections from the source CSV
#   MRI_drop_fa_cortical      — same as MRI but with the 172 FA-cortical cols
#                               removed (drop_fa_cortical step)
#   DL_SFCN                   — Data/DL_features/sfcn_features.csv
#   DL_PYMENT                 — Data/DL_features/pyment_features.csv
#   DL_DTI_OOF_AGE            — predicted_age column from
#                               GripForce/analysis/brainage/cv_predictions.csv
#   DL_DTI_VOXEL_RIDGE        — three OOF columns from
#                               Data/DL_features/dti_voxel_ridge_oof.csv
#   DL_RSFMRI_FC              — rsfmri_fc_ridge OOF scalar from
#                               Data/DL_features/rsfmri_fc_oof.csv
#   DTI_ROI                   — 90 JHU ROI features from
#                               GripForce/analysis/brainage/features_roi.csv
#
# Several frontier steps in the original pipeline added *engineering* on top of
# already-present blocks (composite groups, per-feature transforms, cross-mod
# composite groupings) without introducing a new information channel. Under
# the clean protocol — which uses only block-level RidgeCV → RidgeCV stacking
# and deliberately omits the bespoke composite/transform machinery of train.py
# — those steps are no-ops by construction. They are still included in the
# replay so the verdict is recorded explicitly. Affected configs are flagged
# with `no_new_information: true` below.
#
# clean_protocol_caveat: this audit replays the *information content* of each
# frontier step under a uniform clean stacker, not train.py's full
# feature-engineering machinery. Absolute MAE values therefore differ from
# results.tsv. The audit's question is "would each step's marginal
# improvement still be detected under leakage-free preprocessing?", not
# "can we reproduce results.tsv to the third decimal?".

